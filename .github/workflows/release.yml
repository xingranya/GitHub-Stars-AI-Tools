name: Release Desktop Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，例如 0.1.0 或 v0.1.0"
        required: true
        type: string
      changelog:
        description: "简短更新日志；多行 Markdown 请填 changelog_file"
        required: false
        type: string
      changelog_file:
        description: "仓库内 Markdown 文件路径，例如 docs/releases/v0.1.0.md"
        required: false
        type: string
      release_draft:
        description: "是否创建草稿 Release"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "是否标记为预发布"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Normalize version
        id: meta
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          version="${RAW_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "版本号必须类似 0.1.0、v0.1.0 或 0.1.0-beta.1" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version" >> "$GITHUB_OUTPUT"
          echo "release_name=GitHub-Stars-AI-Tools v$version" >> "$GITHUB_OUTPUT"

      - name: Verify updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "缺少 TAURI_SIGNING_PRIVATE_KEY，无法生成 updater 签名。" >&2
            exit 1
          fi
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]]; then
            echo "缺少 TAURI_SIGNING_PRIVATE_KEY_PASSWORD，无法解锁 updater 私钥。" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS Apple Silicon
            os: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            rust_targets: aarch64-apple-darwin
            native_target: aarch64-apple-darwin
          - platform: Windows
            os: windows-latest
            args: --bundles nsis
            rust_targets: ""
            native_target: x86_64-pc-windows-msvc
          - platform: Linux
            os: ubuntu-24.04
            args: ""
            rust_targets: ""
            native_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const version = process.env.RELEASE_VERSION;
          if (!version) {
            throw new Error('缺少 RELEASE_VERSION');
          }

          for (const file of ['package.json', 'apps/desktop/package.json', 'apps/desktop/src-tauri/tauri.conf.json']) {
            const data = JSON.parse(readFileSync(file, 'utf8'));
            data.version = version;
            writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          }

          const cargoFile = 'apps/desktop/src-tauri/Cargo.toml';
          const cargo = readFileSync(cargoFile, 'utf8');
          writeFileSync(cargoFile, cargo.replace(/^version = ".*"$/m, `version = "${version}"`));
          NODE

      - name: Refresh Cargo lockfile
        shell: bash
        run: cargo metadata --manifest-path apps/desktop/src-tauri/Cargo.toml --format-version 1 > /dev/null

      - name: Verify synced release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { readFileSync } from 'node:fs';

          const expectedVersion = process.env.RELEASE_VERSION;
          if (!expectedVersion) {
            throw new Error('缺少 RELEASE_VERSION');
          }

          const jsonFiles = [
            'package.json',
            'apps/desktop/package.json',
            'apps/desktop/src-tauri/tauri.conf.json',
          ];
          for (const file of jsonFiles) {
            const actualVersion = JSON.parse(readFileSync(file, 'utf8')).version;
            if (actualVersion !== expectedVersion) {
              throw new Error(`${file} 版本号为 ${actualVersion}，预期为 ${expectedVersion}`);
            }
          }

          const cargo = readFileSync('apps/desktop/src-tauri/Cargo.toml', 'utf8').replace(/\r\n/g, '\n');
          const cargoVersion = cargo.match(/^version = "([^"]+)"$/m)?.[1];
          if (cargoVersion !== expectedVersion) {
            throw new Error(`Cargo.toml 版本号为 ${cargoVersion ?? '空'}，预期为 ${expectedVersion}`);
          }

          const metadata = JSON.parse(execFileSync('cargo', [
            'metadata',
            '--manifest-path',
            'apps/desktop/src-tauri/Cargo.toml',
            '--format-version',
            '1',
            '--locked',
            '--no-deps',
          ], { encoding: 'utf8' }));
          const localPackageVersion = metadata.packages.find((pkg) => pkg.name === 'gsat-desktop')?.version;
          if (localPackageVersion !== expectedVersion) {
            throw new Error(`cargo metadata 中 gsat-desktop 版本号为 ${localPackageVersion ?? '空'}，预期为 ${expectedVersion}`);
          }
          NODE

      - name: Build shared packages
        run: pnpm build:packages

      - name: Prepare zvec native runtime
        run: node apps/desktop/scripts/prepare-native-runtime.mjs --bootstrap --target ${{ matrix.native_target }}

      - name: Resolve release notes
        id: release-notes
        shell: bash
        env:
          CHANGELOG_FILE: ${{ inputs.changelog_file }}
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          changelog_file="$CHANGELOG_FILE"
          changelog="$CHANGELOG"

          if [[ -n "$changelog_file" ]]; then
            if [[ "$changelog_file" = /* || "$changelog_file" == *".."* ]]; then
              echo "changelog_file 必须是仓库内相对路径，且不能包含 .." >&2
              exit 1
            fi
            if [[ ! -f "$changelog_file" ]]; then
              echo "更新日志文件不存在：$changelog_file" >&2
              exit 1
            fi
            notes_file="$changelog_file"
          else
            if [[ -z "$changelog" ]]; then
              echo "必须填写 changelog 或 changelog_file" >&2
              exit 1
            fi
            notes_file="$RUNNER_TEMP/release-notes.md"
            printf '%s\n' "$changelog" > "$notes_file"
          fi

          delimiter="GSAT_RELEASE_NOTES_${RANDOM}_${RANDOM}"
          while grep -Fxq "$delimiter" "$notes_file"; do
            delimiter="${delimiter}_${RANDOM}"
          done
          {
            echo "body<<$delimiter"
            cat "$notes_file"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Import Windows signing certificate
        id: windows-signing
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host "WINDOWS_CERTIFICATE 未配置，跳过 Windows 代码签名。"
            "tauri_config_arg=" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw "已配置 WINDOWS_CERTIFICATE，但缺少 WINDOWS_CERTIFICATE_PASSWORD。"
          }

          New-Item -ItemType Directory -Force certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt

          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $certificate = Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $password

          if (-not $certificate -or [string]::IsNullOrWhiteSpace($certificate.Thumbprint)) {
            throw "Windows 签名证书导入失败，未读取到证书指纹。"
          }

          $signingConfig = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $certificate.Thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
              }
            }
          } | ConvertTo-Json -Depth 6

          Set-Content -Path apps/desktop/src-tauri/tauri.windows.signing.json -Value $signingConfig
          "tauri_config_arg=--config src-tauri/tauri.windows.signing.json" >> $env:GITHUB_OUTPUT

      - name: Build and publish desktop installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ needs.prepare.outputs.tag_name }}
          releaseName: ${{ needs.prepare.outputs.release_name }}
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: ${{ inputs.release_draft }}
          prerelease: ${{ inputs.prerelease }}
          uploadPlainBinary: false
          args: ${{ matrix.args }} ${{ steps.windows-signing.outputs.tauri_config_arg }}

      - name: Verify Windows native runtime package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $runtime = "apps/desktop/src-tauri/runtime/zvec_c_api.dll"
          if (-not (Test-Path $runtime)) {
            throw "未准备 Windows zvec 运行库：$runtime"
          }
          $installer = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis" `
            -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "未找到 NSIS 安装包。"
          }
          $listing = & 7z l $installer.FullName
          $listingText = $listing -join "`n"
          if ($LASTEXITCODE -ne 0 -or $listingText -notmatch "zvec_c_api.dll") {
            throw "NSIS 安装包未包含 zvec_c_api.dll。"
          }

      - name: Verify Linux native runtime packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          runtime="apps/desktop/src-tauri/runtime/libzvec_c_api.so"
          test -f "$runtime"

          bundle_root="apps/desktop/src-tauri/target/release/bundle"
          deb="$(find "$bundle_root/deb" -name '*.deb' -print -quit)"
          rpm_file="$(find "$bundle_root/rpm" -name '*.rpm' -print -quit)"
          appimage="$(find "$bundle_root/appimage" -name '*.AppImage' -print -quit)"
          test -n "$deb" && test -n "$rpm_file" && test -n "$appimage"
          dpkg-deb --contents "$deb" | grep -F 'usr/lib/github-stars-ai-tools/libzvec_c_api.so'
          rpm -qlp "$rpm_file" | grep -F '/usr/lib/github-stars-ai-tools/libzvec_c_api.so'

          extract_dir="$RUNNER_TEMP/gsat-appimage"
          mkdir -p "$extract_dir"
          appimage_path="$GITHUB_WORKSPACE/$appimage"
          chmod +x "$appimage_path"
          cd "$extract_dir"
          "$appimage_path" --appimage-extract > /dev/null
          test -f "squashfs-root/usr/lib/github-stars-ai-tools/libzvec_c_api.so"

      - name: Repackage macOS DMG with large Finder icons
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RUST_TARGET: ${{ matrix.rust_targets }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm --filter @gsat/desktop tauri build --target "$RUST_TARGET" --bundles app
          app_path="apps/desktop/src-tauri/target/$RUST_TARGET/release/bundle/macos/GitHub-Stars-AI-Tools.app"
          test -f "$app_path/Contents/Frameworks/libzvec_c_api.dylib"
          codesign --verify --deep --strict "$app_path"
          otool -l "$app_path/Contents/MacOS/gsat-desktop" | grep -F '@executable_path/../Frameworks'
          dmg_path="$(pnpm --filter @gsat/desktop package:dmg -- --target "$RUST_TARGET" | tail -n 1)"
          expected_name="GitHub-Stars-AI-Tools_${RELEASE_VERSION}_aarch64.dmg"
          if [[ ! -f "$dmg_path" ]]; then
            echo "未生成 DMG：$dmg_path" >&2
            exit 1
          fi
          if [[ "$(basename "$dmg_path")" != "$expected_name" ]]; then
            echo "DMG 文件名不符合发布约定：$(basename "$dmg_path")，预期 $expected_name" >&2
            exit 1
          fi
          hdiutil verify "$dmg_path"
          gh release upload "$TAG_NAME" "$dmg_path" --clobber

  verify-release-assets:
    name: Verify release assets
    needs: [prepare, build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Verify installers and updater manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          expected_assets=(
            "GitHub-Stars-AI-Tools_${RELEASE_VERSION}_aarch64.dmg"
            "GitHub-Stars-AI-Tools_${RELEASE_VERSION}_aarch64.app.tar.gz"
            "GitHub-Stars-AI-Tools_${RELEASE_VERSION}_aarch64.app.tar.gz.sig"
            "GitHub-Stars-AI-Tools_${RELEASE_VERSION}_x64-setup.exe"
            "GitHub-Stars-AI-Tools_${RELEASE_VERSION}_x64-setup.exe.sig"
            "GitHub-Stars-AI-Tools_${RELEASE_VERSION}_amd64.AppImage"
            "GitHub-Stars-AI-Tools_${RELEASE_VERSION}_amd64.AppImage.sig"
            "GitHub-Stars-AI-Tools_${RELEASE_VERSION}_amd64.deb"
            "GitHub-Stars-AI-Tools_${RELEASE_VERSION}_amd64.deb.sig"
            "GitHub-Stars-AI-Tools-${RELEASE_VERSION}-1.x86_64.rpm"
            "GitHub-Stars-AI-Tools-${RELEASE_VERSION}-1.x86_64.rpm.sig"
            "latest.json"
          )

          assets_ready=false
          for attempt in {1..18}; do
            assets="$(gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' || true)"
            missing_assets=()
            for expected_asset in "${expected_assets[@]}"; do
              if ! grep -Fxq "$expected_asset" <<< "$assets"; then
                missing_assets+=("$expected_asset")
              fi
            done
            if (( ${#missing_assets[@]} == 0 )); then
              assets_ready=true
              break
            fi
            echo "等待 Release 资产上传完成，第 $attempt 次检查；仍缺少：${missing_assets[*]}"
            sleep 10
          done

          if [[ "$assets_ready" != true ]]; then
            echo "Release 资产不完整，请检查各平台打包与 updater 签名。" >&2
            echo "当前 Release 资产："
            gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' || true
            exit 1
          fi

          manifest_dir="$RUNNER_TEMP/updater-manifest"
          mkdir -p "$manifest_dir"
          gh release download "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern latest.json \
            --dir "$manifest_dir" \
            --clobber
          manifest="$manifest_dir/latest.json"
          jq -e --arg version "$RELEASE_VERSION" '.version == $version' "$manifest" > /dev/null
          for platform in darwin-aarch64 windows-x86_64 linux-x86_64; do
            jq -e --arg platform "$platform" '
              .platforms[$platform]
              | (.url | type == "string" and length > 0)
                and (.signature | type == "string" and length > 0)
            ' "$manifest" > /dev/null
          done
          jq -e '.platforms["darwin-x86_64"] == null' "$manifest" > /dev/null
          echo "三平台安装包、签名文件和 updater 清单均已通过校验。"
