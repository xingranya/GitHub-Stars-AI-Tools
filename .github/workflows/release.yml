name: Release Desktop Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，例如 0.1.0 或 v0.1.0"
        required: true
        type: string
      changelog:
        description: "简短更新日志；多行 Markdown 请填 changelog_file"
        required: false
        type: string
      changelog_file:
        description: "仓库内 Markdown 文件路径，例如 docs/releases/v0.1.0.md"
        required: false
        type: string
      release_draft:
        description: "是否创建草稿 Release"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "是否标记为预发布"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Normalize version
        id: meta
        shell: bash
        run: |
          raw_version="${{ github.event.inputs.version }}"
          version="${raw_version#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "版本号必须类似 0.1.0、v0.1.0 或 0.1.0-beta.1" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version" >> "$GITHUB_OUTPUT"
          echo "release_name=GitHub-Stars-AI-Tools v$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS Apple Silicon
            os: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            rust_targets: aarch64-apple-darwin
          - platform: Windows
            os: windows-latest
            args: --bundles nsis
            rust_targets: ""
          - platform: Linux
            os: ubuntu-22.04
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const version = process.env.RELEASE_VERSION;
          if (!version) {
            throw new Error('缺少 RELEASE_VERSION');
          }

          for (const file of ['package.json', 'apps/desktop/package.json', 'apps/desktop/src-tauri/tauri.conf.json']) {
            const data = JSON.parse(readFileSync(file, 'utf8'));
            data.version = version;
            writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          }

          const cargoFile = 'apps/desktop/src-tauri/Cargo.toml';
          const cargo = readFileSync(cargoFile, 'utf8');
          writeFileSync(cargoFile, cargo.replace(/^version = ".*"$/m, `version = "${version}"`));
          NODE

      - name: Refresh Cargo lockfile
        shell: bash
        run: cargo metadata --manifest-path apps/desktop/src-tauri/Cargo.toml --format-version 1 > /dev/null

      - name: Verify synced release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { readFileSync } from 'node:fs';

          const expectedVersion = process.env.RELEASE_VERSION;
          if (!expectedVersion) {
            throw new Error('缺少 RELEASE_VERSION');
          }

          const jsonFiles = [
            'package.json',
            'apps/desktop/package.json',
            'apps/desktop/src-tauri/tauri.conf.json',
          ];
          for (const file of jsonFiles) {
            const actualVersion = JSON.parse(readFileSync(file, 'utf8')).version;
            if (actualVersion !== expectedVersion) {
              throw new Error(`${file} 版本号为 ${actualVersion}，预期为 ${expectedVersion}`);
            }
          }

          const cargo = readFileSync('apps/desktop/src-tauri/Cargo.toml', 'utf8').replace(/\r\n/g, '\n');
          const cargoVersion = cargo.match(/^version = "([^"]+)"$/m)?.[1];
          if (cargoVersion !== expectedVersion) {
            throw new Error(`Cargo.toml 版本号为 ${cargoVersion ?? '空'}，预期为 ${expectedVersion}`);
          }

          const metadata = JSON.parse(execFileSync('cargo', [
            'metadata',
            '--manifest-path',
            'apps/desktop/src-tauri/Cargo.toml',
            '--format-version',
            '1',
            '--locked',
            '--no-deps',
          ], { encoding: 'utf8' }));
          const localPackageVersion = metadata.packages.find((pkg) => pkg.name === 'gsat-desktop')?.version;
          if (localPackageVersion !== expectedVersion) {
            throw new Error(`cargo metadata 中 gsat-desktop 版本号为 ${localPackageVersion ?? '空'}，预期为 ${expectedVersion}`);
          }
          NODE

      - name: Build shared packages
        run: pnpm build:packages

      - name: Resolve release notes
        id: release-notes
        shell: bash
        run: |
          changelog_file="${{ github.event.inputs.changelog_file }}"
          changelog="${{ github.event.inputs.changelog }}"

          if [[ -n "$changelog_file" ]]; then
            if [[ "$changelog_file" = /* || "$changelog_file" == *".."* ]]; then
              echo "changelog_file 必须是仓库内相对路径，且不能包含 .." >&2
              exit 1
            fi
            if [[ ! -f "$changelog_file" ]]; then
              echo "更新日志文件不存在：$changelog_file" >&2
              exit 1
            fi
            notes_file="$changelog_file"
          else
            if [[ -z "$changelog" ]]; then
              echo "必须填写 changelog 或 changelog_file" >&2
              exit 1
            fi
            notes_file="$RUNNER_TEMP/release-notes.md"
            printf '%s\n' "$changelog" > "$notes_file"
          fi

          {
            echo "body<<EOF"
            cat "$notes_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Import Windows signing certificate
        id: windows-signing
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host "WINDOWS_CERTIFICATE 未配置，跳过 Windows 代码签名。"
            "tauri_config_arg=" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw "已配置 WINDOWS_CERTIFICATE，但缺少 WINDOWS_CERTIFICATE_PASSWORD。"
          }

          New-Item -ItemType Directory -Force certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt

          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $certificate = Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $password

          if (-not $certificate -or [string]::IsNullOrWhiteSpace($certificate.Thumbprint)) {
            throw "Windows 签名证书导入失败，未读取到证书指纹。"
          }

          $signingConfig = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $certificate.Thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
              }
            }
          } | ConvertTo-Json -Depth 6

          Set-Content -Path apps/desktop/src-tauri/tauri.windows.signing.json -Value $signingConfig
          "tauri_config_arg=--config src-tauri/tauri.windows.signing.json" >> $env:GITHUB_OUTPUT

      - name: Build and publish desktop installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ needs.prepare.outputs.tag_name }}
          releaseName: ${{ needs.prepare.outputs.release_name }}
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: ${{ github.event.inputs.release_draft }}
          prerelease: ${{ github.event.inputs.prerelease }}
          uploadPlainBinary: false
          args: ${{ matrix.args }} ${{ steps.windows-signing.outputs.tauri_config_arg }}

      - name: Repackage macOS DMG with large Finder icons
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RUST_TARGET: ${{ matrix.rust_targets }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm --filter @gsat/desktop tauri build --target "$RUST_TARGET" --bundles app
          dmg_path="$(pnpm --filter @gsat/desktop package:dmg -- --target "$RUST_TARGET" | tail -n 1)"
          if [[ ! -f "$dmg_path" ]]; then
            echo "未生成 DMG：$dmg_path" >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" "$dmg_path" --clobber

  verify-updater-manifest:
    name: Verify updater manifest asset
    needs: [prepare, build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Verify updater manifest asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          for attempt in {1..18}; do
            assets="$(gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' || true)"
            if grep -Fxq 'latest.json' <<< "$assets"; then
              echo "Release 已包含 Tauri updater 静态清单 latest.json。"
              exit 0
            fi
            echo "等待 latest.json 上传完成，第 $attempt 次检查。"
            sleep 10
          done
          echo "Release 未找到 latest.json，请检查 Tauri updater artifacts 和签名密钥配置。" >&2
          echo "当前 Release 资产："
          gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' || true
          exit 1
